name: Deploy Bicep

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Bicep Template
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: GitHub-Bicep-RG
        template: ./main.bicep
        parameters: ./main.parameters.json
